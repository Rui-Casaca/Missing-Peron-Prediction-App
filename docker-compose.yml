services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: sar-postgis
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sar_desaparecidos}
      POSTGRES_USER: ${POSTGRES_USER:-sar_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sar_app} -d ${POSTGRES_DB:-sar_desaparecidos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sar-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  adminer:
    image: adminer:4
    container_name: sar-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
